name: Stax
options:
  bundleIdPrefix: com.example
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "15.0"
  generateEmptyDirectories: true

settings:
  base:
    SWIFT_VERSION: "5.9"
    MARKETING_VERSION: "1.0.0"
    CURRENT_PROJECT_VERSION: "1"
    DEVELOPMENT_TEAM: ""

targets:
  Stax:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: Stax
        excludes:
          - "Resources/**"
    resources:
      - path: Stax/Resources
      - path: Stax/Assets.xcassets
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.example.stax
        INFOPLIST_FILE: Stax/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
    info:
      path: Stax/Info.plist
      properties:
        CFBundleDisplayName: Stax
        CFBundleShortVersionString: "1.0.0"
        CFBundleVersion: "1"
        NSCameraUsageDescription: "Stax needs camera access to scan and photograph your chip stacks."
        NSPhotoLibraryUsageDescription: "Stax needs photo library access to add photos to your sessions."
        NSPhotoLibraryAddUsageDescription: "Stax saves your chip stack photos to your photo library."
        NSLocationWhenInUseUsageDescription: "Stax uses your location to find nearby card rooms."
        UILaunchStoryboardName: ""
        UIApplicationSupportsIndirectInputEvents: true
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        UISupportedInterfaceOrientations~ipad:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationPortraitUpsideDown
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
